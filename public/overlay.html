<!DOCTYPE html>
<html>
<head>
    <title>IRIS | Orb Constellation</title>
    <style>
        :root {
            --bg-glass: rgba(8, 8, 8, 0.6);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Outfit', system-ui, sans-serif;
            overflow: hidden;
            background: transparent;
        }

        /* --- THE COGNITIVE VEIL --- */
        #veil {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            z-index: 1;
            transition: background 0.7s var(--curve), backdrop-filter 0.7s var(--curve);
            pointer-events: none;
        }

        body.active #veil {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            pointer-events: auto;
        }

        /* --- ORBITAL CANVAS --- */
        #orb-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s var(--curve);
        }

        body.active #orb-canvas {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- HOLOGRAPHIC TOOLTIP --- */
        #orb-tooltip {
            position: fixed;
            top: -1000px;
            left: -1000px;
            z-index: 20;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -150%);
            transition: opacity 0.2s var(--curve), transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0, 229, 255, 0.1);
            min-width: 180px;
        }

        #orb-tooltip.visible {
            opacity: 1;
            transform: translate(-50%, -120%);
        }

        .tt-icon {
            font-size: 1.2rem;
            margin-bottom: 6px;
            display: inline-block;
        }

        .tt-type {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .tt-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.3;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- CINEMATIC RESTORE --- */
        #cinematic-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #cinematic-overlay.active { opacity: 1; pointer-events: auto; }

        .cinematic-glow {
            position: absolute; width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 60%);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            opacity: 0; transition: all 2s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 1;
        }

        #cinematic-overlay.active .cinematic-glow { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }

        .cinematic-content {
            width: 800px; transform: translateY(30px) scale(0.97);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; z-index: 2;
        }

        #cinematic-overlay.active .cinematic-content { transform: translateY(0) scale(1); opacity: 1; }

        .cinematic-title { 
            font-size: 2.2rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 8px; text-align: center; 
            background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0.4));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .cinematic-subtitle { 
            font-size: 0.95rem; color: var(--accent); opacity: 0.9; text-align: center; margin-bottom: 45px; letter-spacing: 0.02em;
        }

        .hologram-stage {
            perspective: 1200px; display: flex; gap: 24px; justify-content: center; align-items: center;
            margin-top: 20px; margin-bottom: 20px; height: 240px; width: 100%;
        }

        .holo-card {
            width: 220px; height: 180px; flex-shrink: 0;
            background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(0,0,0,0.4));
            border: 1px solid rgba(255,255,255,0.05); border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(12px); opacity: 0; transform-style: preserve-3d;
            transform: translateZ(-800px) translateY(200px) rotateX(50deg) rotateY(-30deg) scale(0.6);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 12px; box-sizing: border-box;
        }

        .holo-card:nth-child(2) { transform: translateZ(-900px) translateY(250px) rotateX(40deg) rotateY(10deg) scale(0.5); }
        .holo-card:nth-child(3) { transform: translateZ(-850px) translateY(180px) rotateX(60deg) rotateY(40deg) scale(0.6); }

        .holo-card.animate-in {
            opacity: 1; transform: translateZ(0) translateY(0) rotateX(0) rotateY(0) scale(1);
            border-top-color: var(--accent); border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 229, 255, 0.15);
        }

        .mini-window {
            width: 100%; height: 140px; background: #1e1e1e; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 16px; transform: translateZ(20px); transition: transform 0.5s;
        }
        .holo-card.animate-in .mini-window { transform: translateZ(40px); box-shadow: 0 15px 30px rgba(0,0,0,0.8); }

        .mini-header {
            height: 18px; background: #2d2d2d; display: flex; align-items: center; padding: 0 8px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.5); flex-shrink: 0;
        }
        .dots { display: flex; gap: 4px; }
        .dots span { width: 6px; height: 6px; border-radius: 50%; background: #ff5f56; }
        .dots span:nth-child(2) { background: #ffbd2e; }
        .dots span:nth-child(3) { background: #27c93f; }
        
        .holo-subtitle { 
            font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; transform: translateZ(10px); white-space: nowrap;
        }

        .cinematic-summary {
            margin-top: 40px; text-align: center; font-size: 0.95rem; color: var(--text-secondary); opacity: 0; transform: translateY(10px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .cinematic-summary.visible { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body>
    <div id="veil"></div>
    <canvas id="orb-canvas"></canvas>
    
    <div id="orb-tooltip">
        <div class="tt-icon" id="tt-icon">✨</div>
        <div class="tt-type" id="tt-type">Type</div>
        <div class="tt-title" id="tt-title">Title</div>
    </div>

    <!-- CINEMATIC OVERLAY -->
    <div id="cinematic-overlay">
        <div class="cinematic-glow"></div>
        <div class="cinematic-content">
            <div class="cinematic-title">Reconstructing Workspace</div>
            <div class="cinematic-subtitle">Initializing cognitive anchors...</div>
            <div class="hologram-stage" id="c-items"></div>
            <div class="cinematic-summary" id="c-summary"></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // --- ORBITAL PHYSICS ENGINE ---
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('orb-tooltip');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        let center = { x: width / 2, y: height / 2 };
        
        let nodes = [];
        let globalAngleOffset = 0;
        let hoveredNode = null;
        let mousePos = { x: -1000, y: -1000 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * (window.devicePixelRatio || 1);
            canvas.height = height * (window.devicePixelRatio || 1);
            ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
            center = { x: width / 2, y: height / 2 };
        }
        window.addEventListener('resize', resize);
        resize();

        // Parallax stars
        const stars = Array.from({length: 150}, () => ({
            x: Math.random() * 2000,
            y: Math.random() * 2000,
            size: Math.random() * 1.5,
            speed: Math.random() * 0.05
        }));

        ipcRenderer.on('workflow-update', (event, workflowSession) => {
            nodes = [];
            
            // Center Sun (Workspace)
            nodes.push({
                isCenter: true,
                title: workflowSession.name || "Ambient Flow",
                type: "Active Workflow",
                icon: "🧠",
                radius: 40,
                color: "#00e5ff",
                orbitRadius: 0,
                baseAngle: 0,
                x: center.x,
                y: center.y
            });
            
            // Build orbits
            const apps = workflowSession.dominantApps || [];
            const urls = workflowSession.urls || [];
            const files = workflowSession.files || [];
            
            const addOrbitRing = (items, type, icon, orbitRadius, color, baseSpeed) => {
                const count = items.length;
                items.forEach((item, i) => {
                    let title = item;
                    if (type === "Research") {
                        try { title = new URL(item).hostname.replace('www.',''); } catch(e){}
                    } else if (type === "File Editor") {
                        title = item.split(/[/\\]/).pop();
                    }
                    
                    nodes.push({
                        isCenter: false,
                        title, type, icon, orbitRadius, color,
                        baseAngle: (Math.PI * 2 / count) * i,
                        speed: baseSpeed + (Math.random() * 0.002 - 0.001),
                        radius: 12 + Math.random() * 8,
                        driftX: Math.random() * 20 - 10,
                        driftY: Math.random() * 20 - 10,
                        x: center.x, y: center.y
                    });
                });
            };

            addOrbitRing(apps, "App Workspace", "💻", 180, "#b200ff", 0.003);
            addOrbitRing(files, "File Editor", "📄", 280, "#00ff88", -0.002);
            addOrbitRing(urls, "Research", "🌐", 380, "#ff00e5", 0.0015);
        });

        canvas.addEventListener('mousemove', (e) => {
            mousePos = { x: e.clientX, y: e.clientY };
            let found = null;
            for (let i = nodes.length - 1; i >= 0; i--) {
                const n = nodes[i];
                const dist = Math.hypot(mousePos.x - n.x, mousePos.y - n.y);
                if (dist < n.radius + 15) {
                    found = n;
                    break;
                }
            }
            
            if (found !== hoveredNode) {
                hoveredNode = found;
                if (hoveredNode) {
                    document.getElementById('tt-icon').innerText = hoveredNode.icon;
                    document.getElementById('tt-type').innerText = hoveredNode.type;
                    document.getElementById('tt-title').innerText = hoveredNode.title;
                    tooltip.style.left = hoveredNode.x + 'px';
                    tooltip.style.top = hoveredNode.y + 'px';
                    tooltip.classList.add('visible');
                    canvas.style.cursor = 'pointer';
                } else {
                    tooltip.classList.remove('visible');
                    canvas.style.cursor = 'default';
                }
            }
        });

        function render() {
            // Faint clear for motion blur trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, width, height);
            
            // Draw Parallax Stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(s => {
                s.x = (s.x - s.speed * (mousePos.x - center.x) * 0.05 + 2000) % 2000;
                s.y = (s.y - s.speed * (mousePos.y - center.y) * 0.05 + 2000) % 2000;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            globalAngleOffset += 0.001;

            // Pre-calculate positions
            const t = Date.now() * 0.001;
            nodes.forEach(n => {
                if (n.isCenter) {
                    n.x = center.x + Math.sin(t * 0.5) * 10;
                    n.y = center.y + Math.cos(t * 0.7) * 10;
                } else {
                    const currentAngle = n.baseAngle + globalAngleOffset + (t * n.speed);
                    // Add subtle floating drift to orbit
                    const driftX = Math.sin(t + n.driftX) * 15;
                    const driftY = Math.cos(t + n.driftY) * 15;
                    
                    n.x = center.x + Math.cos(currentAngle) * n.orbitRadius + driftX;
                    n.y = center.y + Math.sin(currentAngle) * n.orbitRadius + driftY;
                }
            });

            // Draw Connection Tethers
            ctx.lineWidth = 1;
            nodes.forEach(n => {
                if (!n.isCenter) {
                    const isHovered = (hoveredNode === n || (hoveredNode && hoveredNode.isCenter));
                    
                    const grad = ctx.createLinearGradient(center.x, center.y, n.x, n.y);
                    grad.addColorStop(0, 'rgba(0, 229, 255, ' + (isHovered ? '0.4' : '0.1') + ')');
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    
                    ctx.strokeStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(nodes[0]?.x || center.x, nodes[0]?.y || center.y);
                    ctx.lineTo(n.x, n.y);
                    ctx.stroke();
                }
            });

            // Draw Orbs
            nodes.forEach(n => {
                const isHovered = hoveredNode === n;
                const r = isHovered ? n.radius * 1.3 : n.radius;
                
                // Glow
                const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 4);
                glow.addColorStop(0, n.color + (isHovered ? '99' : '44'));
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(n.x, n.y, r * 4, 0, Math.PI * 2);
                ctx.fill();
                // Core (Neon Ring)
                ctx.strokeStyle = isHovered ? '#ffffff' : n.color;
                ctx.lineWidth = isHovered ? 2.5 : 1.5;
                ctx.beginPath();
                ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
                ctx.stroke();
                
                // Inner nucleus dot
                ctx.fillStyle = isHovered ? '#ffffff' : n.color;
                ctx.beginPath();
                ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Icon
                if (n.radius > 20 || isHovered) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${isHovered ? 14 : 24}px system-ui`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const yOffset = n.radius > 20 ? 0 : -25;
                    ctx.fillText(n.icon, n.x, n.y + yOffset);
                }
            });
            
            // Update tooltip position smoothly if hovered
            if (hoveredNode) {
                tooltip.style.left = hoveredNode.x + 'px';
                tooltip.style.top = hoveredNode.y + 'px';
            }

            requestAnimationFrame(render);
        }
        
        requestAnimationFrame(render);

        // Overlay Toggle Logic
        ipcRenderer.on('toggle-overlay', () => {
            if (document.body.classList.contains('active')) {
                closeSequence();
            } else {
                openSequence();
            }
        });

        function openSequence() {
            ipcRenderer.send('show-overlay-window');
            requestAnimationFrame(() => {
                document.body.classList.add('active');
                ipcRenderer.send('set-ignore-mouse', false);
            });
        }

        function closeSequence() {
            document.body.classList.remove('active');
            ipcRenderer.send('set-ignore-mouse', true);
            setTimeout(() => {
                ipcRenderer.send('hide-overlay-window');
            }, 800);
        }

        document.getElementById('veil').addEventListener('click', closeSequence);

        // Cinematic Restore Logic
        ipcRenderer.on('resume-sequence', (event, data) => {
            const overlay = document.getElementById('cinematic-overlay');
            const items = document.getElementById('c-items');
            const summary = document.getElementById('c-summary');
            
            if (data.type === 'start') {
                overlay.classList.add('active');
                items.innerHTML = '';
                summary.classList.remove('visible');
                summary.innerText = '';
            } else if (data.type === 'progress') {
                const card = document.createElement('div');
                card.className = 'holo-card';
                card.innerHTML = `
                    <div class="mini-window">
                        <div class="mini-header"><div class="dots"><span></span><span></span><span></span></div></div>
                        <div style="flex:1; background:#000; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.2); font-size: 2rem;">${data.icon || '🚀'}</div>
                    </div>
                    <div class="holo-subtitle">${data.message}</div>
                `;
                items.appendChild(card);
                
                requestAnimationFrame(() => {
                    setTimeout(() => card.classList.add('animate-in'), 50);
                });
            } else if (data.type === 'complete') {
                summary.innerText = "Workspace reconstructed successfully.";
                summary.classList.add('visible');
                
                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 3000);
            }
        });
        
        // Listen for Esc to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.body.classList.contains('active')) {
                closeSequence();
            }
        });
    </script>
</body>
</html>
