<!DOCTYPE html>
<html>
<head>
    <title>IRIS Widget</title>
    <style>
        :root {
            --bg: rgba(0, 0, 0, 0.4);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            -webkit-app-region: drag; /* Makes the widget draggable */
        }

        .widget-orb {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid rgba(0, 229, 255, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            -webkit-app-region: no-drag; /* Clickable inside */
            position: relative;
        }

        .widget-orb::before {
            content: 'I';
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--accent);
            font-weight: 900;
            font-size: 1.2rem;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .widget-orb:hover {
            transform: scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
            background: rgba(0, 0, 0, 0.8);
        }

        /* Pulsing animation when active workflow is detected */
        .widget-orb.pulse::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="widget-orb" id="iris-widget"></div>
    <script>
        const { ipcRenderer } = require('electron');
        
        const widget = document.getElementById('iris-widget');
        
        widget.addEventListener('click', () => {
            ipcRenderer.send('toggle-main-window');
        });

        // Optional: Make it pulse when there's an active workflow
        ipcRenderer.on('activity-event', (event, data) => {
            widget.classList.add('pulse');
            setTimeout(() => {
                widget.classList.remove('pulse');
            }, 2000);
        });
    </script>
</body>
</html>
